name: "Application Pipeline"

on:
  push:

permissions:
  contents: read
  checks: write

jobs:
  validate-code:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupération du code
        uses: actions/checkout@v5

      - name: Configuration de Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          
      - name: Cache des modules npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Installation des dépendances
        run: |
          echo "::group::Installation des modules Node.js"
          npm ci
          echo "::endgroup::"
          
      - name: Lancement des tests
        run: npm test
        
      - name: Publication du rapport JUnit
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: '**/junit.xml'
          
      - name: Vérification des variables et secrets
        env:
          ENV_SIMPLE: ${{ vars.APP_ENVIRONMENT }}
          CLE_SECRETE: ${{ secrets.AWS_SECRET_KEY }}
        run: |
          echo "Environnement applicatif : $ENV_SIMPLE"
          echo "Clé AWS récupérée : $CLE_SECRETE"
